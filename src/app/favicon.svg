<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- V2: Bowl & Steam — Forest Green Rounded Square -->
  <!-- Scale to any size: width="16" height="16" / width="32" height="32" / width="128" height="128" -->
  <rect width="128" height="128" rx="24" fill="#1A9B5A"/>
  <!-- Steam: 3 wavy lines (left, center, right) -->
  <path d="M42,50 Q37,40 42,32 Q47,24 42,14" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M64,46 Q59,36 64,28 Q69,20 64,10" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M86,50 Q81,40 86,32 Q91,24 86,14" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Bowl body (U-shaped bezier curve, fills interior) -->
  <path d="M16,62 Q16,106 64,106 Q112,106 112,62 Z" fill="white"/>
  <!-- Bowl rim (ellipse for 3D opening) -->
  <ellipse cx="64" cy="62" rx="48" ry="10" fill="white"/>
  <!-- Base stand -->
  <rect x="50" y="104" width="28" height="7" rx="3.5" fill="white"/>
  <rect x="42" y="109" width="44" height="7" rx="3.5" fill="white"/>
</svg>
